<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>رصد الكميات المقترضة</title>

  <!-- مكتبة الرسم البياني -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Firebase Modular SDK -->
  <script type="module" defer>
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, orderBy, getDocs } 
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAOh6FNHzWl04-1u_VL4fov_xLf95KYnpw",
      authDomain: "sbl-borrowed.firebaseapp.com",
      projectId: "sbl-borrowed",
      storageBucket: "sbl-borrowed.firebasestorage.app",
      messagingSenderId: "265518562378",
      appId: "1:265518562378:web:4b7b43bdaab90f51d47ab3",
      measurementId: "G-WL60V81P60"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let chartInstance = null;

    // تحميل الشركات للقائمة المنسدلة
    async function loadCompanies() {
      const q = query(collection(db, "borrowed"));
      const snapshot = await getDocs(q);

      const companies = new Set();
      snapshot.forEach(doc => companies.add(doc.data().name));

      const select = document.getElementById("companySelect");
      select.innerHTML = "";

      companies.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        select.appendChild(opt);
      });

      if (select.options.length > 0) {
        loadChart(select.value);
      }

      select.onchange = () => loadChart(select.value);
    }

    // عرض الرسم البياني
    async function loadChart(companyName) {
      const q = query(
        collection(db, "borrowed"),
        where("name", "==", companyName),
        orderBy("date")
      );

      const snapshot = await getDocs(q);

      const dates = [];
      const values = [];

      snapshot.forEach(doc => {
        dates.push(doc.data().date);
        values.push(doc.data().borrowed);
      });

      const ctx = document.getElementById("chart").getContext("2d");

      if (chartInstance) chartInstance.destroy();

      chartInstance = new Chart(ctx, {
        type: "line",
        data: {
          labels: dates,
          datasets: [{
            data: values,
            borderColor: "blue",
            borderWidth: 3,
            tension: 0.3,
            fill: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,

          plugins: {
            legend: { display: false }
          },

          scales: {
            x: { title: { display: true, text: "التاريخ" } },
            y: { title: { display: true, text: "القيمة" }, beginAtZero: true }
          }
        }
      });
    }

    // البحث بالرمز
    async function searchBySymbol() {
      const symbol = document.getElementById("symbolInput").value.trim();
      if (!symbol) return;

      const q = query(
        collection(db, "borrowed"),
        where("symbol", "==", symbol)
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        alert("لم يتم العثور على شركة بهذا الرمز");
        return;
      }

      // الحصول على اسم الشركة
      const companyName = snapshot.docs[0].data().name;

      // إضافة الشركة للقائمة المنسدلة إذا لم تكن موجودة
      const select = document.getElementById("companySelect");
      let exists = false;

      for (let i = 0; i < select.options.length; i++) {
        if (select.options[i].value === companyName) {
          exists = true;
          break;
        }
      }

      if (!exists) {
        const opt = document.createElement("option");
        opt.value = companyName;
        opt.textContent = companyName;
        select.appendChild(opt);
      }

      // اختيار الشركة تلقائيًا
      select.value = companyName;

      // عرض الرسم
      loadChart(companyName);
    }

    loadCompanies();
  </script>

  <style>
    body {
      font-family: Tahoma;
      direction: rtl;
      margin: 20px;
      text-align: center;
    }

    select, input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
    }

    .chart-container {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
    }

    canvas {
      width: 100% !important;
      height: auto !important;
    }
  </style>
</head>

<body>
  <h2>رسم بياني لحركة الكميات المقترضة</h2>

  <!-- القائمة المنسدلة -->
  <select id="companySelect"></select>

  <!-- البحث بالرمز -->
  <div>
    <input id="symbolInput" type="text" placeholder="اكتب رمز الشركة">
    <button onclick="searchBySymbol()">بحث</button>
  </div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
</body>
</html>
